<template>
    <div if:true={loading}>
        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
    </div>
    <main>
        <section>
            <form onsubmit={searchQuote} class="searchForm">
                <input name="quoteId" type="text" placeholder="Código de cotización">
                <button>Buscar</button>
                <button class="red" type="button" onclick={clearView}>Limpiar</button>
            </form>
        </section>
        <hr if:true={quoteData.data}>
        <section if:true={quoteData.data} class="quoteDataContainer">
            <div class="recordLinks">
                <a if:true={opportunityUrl} href={opportunityUrl} target="_blank">Oportunidad</a>
                <a if:true={quoteUrl} href={quoteUrl} target="_blank">Cotizacion</a>
                <template for:each={createdOrders} for:item="order">
                    <a key={order.Id} href={order.link} target="_blank">{order.Tipo_de_movimiento_bandera__c}:
                        {order.Name}</a>
                </template>
            </div>
            <div class="quoteHeaderInfo">
                <strong>{quoteData.data.MovID}</strong>
                <button onclick={saveQuote} if:false={isUpdate}>Guardar cotización</button>
            </div>
            <div class="quoteDataInfo">
                <div class="grid-col-2">
                    <lightning-record-picker id="client-record" label="Cliente" placeholder="Cliente"
                        object-api-name="Account" data-type="client" class="label-input"
                        value={quoteData.data._sfAccount.Id}>
                    </lightning-record-picker>
                    <lightning-record-picker id="opportunity-record" label="Oportunidad" placeholder="Oportunidad"
                        object-api-name="Opportunity" data-type="opportunity" class="label-input"
                        value={quoteData.data._sfOpp.Id} onchange={onChangeOpportunity}>
                    </lightning-record-picker>
                </div>
                <div class="grid-col-3">
                    <p><span>Estatus:</span> {quoteData.data.Estatus}</p>
                    <p><span>Concepto:</span> {quoteData.data.Concepto}</p>
                    <p><span>Moneda:</span> {quoteData.data.Moneda}</p>
                </div>
                <div class="grid-col-3">
                    <p><span>Forma de envio:</span> {quoteData.data.FormaEnvio}</p>
                    <p><span>Zona impuesto:</span> {quoteData.data.ZonaImpuesto}</p>
                    <p><span>Condición:</span> {quoteData.data.Condicion}</p>
                </div>
                <section>
                    <h2>Productos de la cotización</h2>
                    <div class="lineProductsContainer">
                        <template for:each={quoteData.data.VentaDCta} for:item="lineItem">
                            <div key={lineItem.Renglon} class="card-container">
                                <header class="card-header">
                                    <span class="label-accent">Artículo</span>
                                    <h3 class="product-title">{lineItem.Articulo}</h3>
                                    <p class="sku-text">Ref: {lineItem.ThoCodigoFabricante}</p>
                                </header>
                                <div class="card-body">
                                    <div class="stats-grid">
                                        <div class="stat-item">
                                            <span class="label">Cantidad</span>
                                            <p class="value">
                                                {lineItem.Cantidad} <span class="unit">{lineItem.Unidad}</span>
                                            </p>
                                        </div>
                                        <div class="stat-item">
                                            <span class="label">Precio Unitario</span>
                                            <p class="value">${lineItem.Precio}</p>
                                        </div>
                                    </div>
                                    <template if:true={lineItem.DescuentoLinea}>
                                        <div class="discount-pill">
                                            -{lineItem.DescuentoLinea}%
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </section>
                <section>
                    <h2>Pedidos</h2>
                    <div class="lineProductsContainer">
                        <template for:each={quoteData.data.DestinoCta} for:item="lineItem">
                            <div key={lineItem.Id} class="card-container">
                                <div class="card-header">
                                    <span class="label-accent">TIPO DE MOVIMIENTO</span>
                                    <p class="product-title">{lineItem.Mov}</p>
                                    <p class="sku-text">Folio: {lineItem.MovID}</p>
                                </div>
                                <div class="card-body">
                                    <div class="stat-item">
                                        <span class="label">Fecha de emisión</span>
                                        <p class="value">{lineItem.FechaEmision}</p>
                                    </div>
                                </div>
                            </div>
                        </template>
                        <template for:each={quoteData.data.DestinoCta} for:item="lineItem">
                            <template for:each={lineItem.DestPedidoCte} for:item="adjustmentLineItem">
                                <div key={adjustmentLineItem.Id} class="card-container">
                                    <div class="card-header">
                                        <span class="label-accent">TIPO DE MOVIMIENTO</span>
                                        <p class="product-title">{adjustmentLineItem.Mov}</p>
                                        <p class="sku-text">Folio: {adjustmentLineItem.MovID}</p>
                                    </div>
                                    <div class="card-body">
                                        <div class="stat-item">
                                            <span class="label">Origen</span>
                                            <p class="value">{adjustmentLineItem.OrigenID}</p>
                                        </div>
                                        <div class="stat-item">
                                            <span class="label">Fecha de emisión</span>
                                            <p class="value">{adjustmentLineItem.FechaEmision}</p>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </template>
                    </div>
                </section>
            </div>
        </section>
    </main>
</template>
